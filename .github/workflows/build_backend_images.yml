name: Build backend images

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile.cpu"
      - ".github/workflows/build_backend_images.yml"
  workflow_dispatch:
    inputs:
      runtime:
        description: "Backend runtime to build"
        required: true
        default: "cpu"
        type: choice
        options:
          - cpu
          - cuda
          - rk
          - all
      torch_whl:
        description: "RK only: optional torch wheel URL or path"
        required: false
        default: ""
        type: string
      onnxruntime_whl:
        description: "RK only: optional ONNX Runtime wheel URL or path"
        required: false
        default: ""
        type: string
      rknn_toolkit_lite2_whl:
        description: "RK only: optional rknn-toolkit-lite2 wheel URL or path"
        required: false
        default: ""
        type: string
      ffmpeg_rk_image:
        description: "RK only: optional FFmpeg RK base image"
        required: false
        default: ""
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-cpu:
    name: CPU image (linux/amd64)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.runtime == 'cpu' || inputs.runtime == 'all'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-cuda:
    name: CUDA image (linux/amd64)
    runs-on: ubuntu-latest
    if: inputs.runtime == 'cuda' || inputs.runtime == 'all'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cuda
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-rk:
    name: RK3588 image (linux/arm64)
    runs-on: ubuntu-latest
    if: inputs.runtime == 'rk' || inputs.runtime == 'all'
    permissions:
      contents: read
      packages: write
    env:
      DEFAULT_FFMPEG_RK_IMAGE: ${{ github.event.inputs.ffmpeg_rk_image != '' && github.event.inputs.ffmpeg_rk_image || format('ghcr.io/{0}/video-ba-pipe-ffmpeg-rk:rkmpp', github.repository_owner) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push RK3588 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.rk
          platforms: linux/arm64
          pull: true
          push: true
          build-args: |
            TORCH_WHL=${{ inputs.torch_whl }}
            ONNXRUNTIME_WHL=${{ inputs.onnxruntime_whl }}
            RKNN_TOOLKIT_LITE2_WHL=${{ inputs.rknn_toolkit_lite2_whl }}
            FFMPEG_RK_IMAGE=${{ env.DEFAULT_FFMPEG_RK_IMAGE }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rk
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rk-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
